<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTools AI — AI 驅動的健康科技評測</title>
    <meta name="description" content="用 AI 幫你找到最適合的健康 App、穿戴裝置與營養工具。專業評測、深度比較、實用推薦。">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(ellipse at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
        }
        .logo { font-size: 4rem; margin-bottom: 1rem; }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981, #06d6a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 1.2rem;
            color: #9ca3af;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .categories {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3rem;
        }
        .cat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            width: 180px;
            transition: all 0.3s;
        }
        .cat-card:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            transform: translateY(-4px);
        }
        .cat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .cat-title { font-weight: 600; font-size: 0.95rem; }
        .coming-soon {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">🏥🤖</div>
        <h1>HealthTools AI</h1>
        <p class="tagline">
            用 AI 幫你找到最適合的健康工具。<br>
            App 評測 · 穿戴裝置比較 · 營養工具推薦
        </p>
        <div class="categories">
            <div class="cat-card">
                <div class="cat-icon">📱</div>
                <div class="cat-title">健康 App 評測</div>
            </div>
            <div class="cat-card">
                <div class="cat-icon">⌚</div>
                <div class="cat-title">穿戴裝置</div>
            </div>
            <div class="cat-card">
                <div class="cat-icon">🥗</div>
                <div class="cat-title">營養工具</div>
            </div>
            <div class="cat-card">
                <div class="cat-icon">🧘</div>
                <div class="cat-title">身心健康</div>
            </div>
        </div>
        <div class="coming-soon">🚀 即將上線 — Coming Soon</div>
    </div>
    <footer>
        © 2026 HealthTools AI. All rights reserved.
    </footer>
</body>
</html>
